name: Publicação manual dos relatórios técnicos do Modelo Axion

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify permanent report files
        shell: bash
        run: |
          set -euo pipefail
          reports_dir='lotofacil_axion/docs/reports'
          test -s "$reports_dir/relatorio_tecnico_01_robustez_mineracao_parametros.pdf"
          test -s "$reports_dir/relatorio_tecnico_02_otimizacao_multiobjetivo_carteiras.pdf"
          test -s "$reports_dir/relatorio_tecnico_03_limites_exatos_11_12_13.pdf"
          test -s "$reports_dir/relatorio_tecnico_04_fronteira_orcamento_eficiencia_marginal.pdf"
          cd "$reports_dir"
          sha256sum --check CHECKSUMS.sha256
