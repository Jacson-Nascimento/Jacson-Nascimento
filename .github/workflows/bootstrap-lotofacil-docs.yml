name: Estruturar documentação do Modelo Axion

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches: [main]
    paths:
      - '.github/lotofacil-docs-trigger.txt'
      - '.github/workflows/bootstrap-lotofacil-docs.yml'
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bootstrap-lotofacil-docs
  cancel-in-progress: true

jobs:
  organize:
    if: github.event_name != 'pull_request_target' || github.event.pull_request.title == 'RUN: publicar documentação Lotofácil Axion'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Materialize project structure
        run: python lotofacil_axion/scripts/bootstrap_documentation.py --root .

      - name: Install document dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r lotofacil_axion/docs/papers/requirements-docs.txt

      - name: Build the two PDF articles
        run: python lotofacil_axion/scripts/build_papers.py

      - name: Validate generated documentation
        run: |
          test -s lotofacil_axion/docs/papers/artigo_01_resultados_intermediarios.pdf
          test -s lotofacil_axion/docs/papers/artigo_02_otimizacao_combinatoria_exata.pdf
          python -m py_compile lotofacil_axion/run_full_cycle.py
          python -m py_compile lotofacil_axion/scripts/build_papers.py
          find lotofacil_axion/docs -maxdepth 3 -type f | sort

      - name: Remove one-time bootstrap files
        run: |
          rm -rf lotofacil_axion/scripts/bootstrap_parts
          rm -f lotofacil_axion/scripts/bootstrap_documentation.py
          rm -f .github/workflows/bootstrap-lotofacil-docs.yml
          rm -f .github/lotofacil-docs-trigger.txt

      - name: Commit organized documentation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Documentation is already current.'
          else
            git commit -m 'docs: organize Modelo Axion and publish papers [skip ci]'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Upload documentation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lotofacil-axion-documentation
          path: |
            lotofacil_axion/docs
            lotofacil_axion/README.md
            lotofacil_axion/PROJECT_STATUS.md
          if-no-files-found: error
          retention-days: 90

      - name: Close trigger pull request
        if: success() && github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr close "${{ github.event.pull_request.number }}" --comment "Documentação estruturada e artigos publicados em PDF no branch main."
