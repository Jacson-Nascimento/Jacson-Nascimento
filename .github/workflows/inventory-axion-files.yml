name: Inventariar arquivos Axion

"on":
  push:
    branches: [main]
    paths:
      - '.github/trigger-inventory-axion.txt'

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Registrar inventário
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Inventário temporário de arquivos do Modelo Axion'
            echo
            echo 'Gerado automaticamente para localizar fontes e PDFs existentes.'
            echo
            find lotofacil_axion -type f -printf '%p\n' | sort
          } > lotofacil_axion/FILE_TREE_TEMP.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .github/trigger-inventory-axion.txt
          rm -f .github/workflows/inventory-axion-files.yml
          git add -A
          git commit -m 'chore: record temporary Axion file inventory [skip ci]'
          git push origin HEAD:main
