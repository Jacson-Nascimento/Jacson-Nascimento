name: Preparar Release Axion v1.0

"on":
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Criar tag e rascunho da Release
    runs-on: ubuntu-latest

    steps:
      - name: Obter repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar relatórios permanentes
        shell: bash
        run: |
          set -euo pipefail
          reports="lotofacil_axion/docs/reports"
          test -s "$reports/relatorio_tecnico_01_robustez_mineracao_parametros.pdf"
          test -s "$reports/relatorio_tecnico_02_otimizacao_multiobjetivo_carteiras.pdf"
          test -s "$reports/relatorio_tecnico_03_limites_exatos_11_12_13.pdf"
          test -s "$reports/relatorio_tecnico_04_fronteira_orcamento_eficiencia_marginal.pdf"
          cd "$reports"
          sha256sum --check CHECKSUMS.sha256

      - name: Montar pacote de preservação
        shell: bash
        run: |
          set -euo pipefail
          package="axion-relatorios-v1.0"
          rm -rf "$package" "$package.zip" "$package.zip.sha256"
          mkdir -p "$package"
          cp lotofacil_axion/docs/reports/*.pdf "$package/"
          cp lotofacil_axion/docs/reports/*.sha256 "$package/"
          cp lotofacil_axion/docs/reports/README.md "$package/README.md"
          cp CITATION.cff "$package/CITATION.cff"
          cp .zenodo.json "$package/.zenodo.json"
          zip -9 -r "$package.zip" "$package"
          sha256sum "$package.zip" > "$package.zip.sha256"
          cp lotofacil_axion/docs/reports/CHECKSUMS.sha256 ./CHECKSUMS.sha256

      - name: Criar tag e rascunho da Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="axion-relatorios-v1.0"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "A tag $tag já existe."
          else
            git tag -a "$tag" -m "Modelo Axion Lotofácil — relatórios técnicos nº 1–4, versão 1.0"
            git push origin "refs/tags/$tag"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              axion-relatorios-v1.0.zip \
              axion-relatorios-v1.0.zip.sha256 \
              CHECKSUMS.sha256 \
              --clobber
          else
            gh release create "$tag" \
              --draft \
              --title "Modelo Axion Lotofácil — Relatórios técnicos nº 1–4, v1.0" \
              --notes "Série documental composta por quatro relatórios técnicos do Modelo Axion Lotofácil, versão 1.0, emitida em 23 de julho de 2026. Os documentos não foram submetidos à revisão por pares e não constituem recomendação financeira nem garantia de premiação." \
              axion-relatorios-v1.0.zip \
              axion-relatorios-v1.0.zip.sha256 \
              CHECKSUMS.sha256
          fi

      - name: Resumo
        shell: bash
        run: |
          echo "Tag preparada: axion-relatorios-v1.0"
          echo "Release criada como rascunho com ZIP e checksums."
